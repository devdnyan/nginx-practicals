services:
  node_app1:
    image: node:18
    container_name: node_app1
    working_dir: /app
    volumes:
      - .:/app
    command: node server.js
    environment:
      - PORT=3000

  node_app2:
    image: node:18
    container_name: node_app2
    working_dir: /app
    environment:
      - PORT=3001
    volumes:
      - .:/app
    command: node server.js

  node_app3:
    image: node:18
    container_name: node_app3
    working_dir: /app
    environment:
      - PORT=3002
    volumes:
      - .:/app
    command: node server.js

  nginx:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - node_app1
      - node_app2
      - node_app3